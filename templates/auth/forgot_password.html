<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password — NETSIBLE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo"><i class="bi bi-shield-lock-fill"></i></div>
            <h2>Lupa Password Sistem Router</h2>
            <p class="auth-subtitle">Masukkan Email Anda untuk menerima tautan pemulihan akun</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert-netsible alert-{{ category }}" style="text-align:left">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="form-group">
                    <label class="form-label-n" for="email">Email</label>
                    <input type="email" class="form-input-n" id="email" name="email"
                           placeholder="Masukkan email terdaftar" required autofocus>
                </div>
                <button type="submit" class="btn-netsible btn-primary-n" style="width:100%;justify-content:center">
                    <i class="bi bi-send"></i> Kirim Tautan Pemulihan
                </button>
                <a href="{{ url_for('auth.login') }}" class="auth-link">
                    <i class="bi bi-arrow-left"></i> Kembali ke Halaman Login
                </a>
            </form>
        </div>
    </div>
</body>
</html>
