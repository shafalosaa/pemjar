<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NETSIBLE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo"><i class="bi bi-diagram-3-fill"></i></div>
            <h2>Login ke Sistem Router</h2>
            <p class="auth-subtitle">Masukkan kredensial Anda untuk mengakses NETSIBLE</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert-netsible alert-{{ category }}" style="text-align:left">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label class="form-label-n" for="username">Email / Username</label>
                    <input type="text" class="form-input-n" id="username" name="username"
                           placeholder="Masukkan email atau username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label-n" for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input-n" id="password" name="password"
                               placeholder="Masukkan password" required>
                        <button type="button" class="toggle-pw" onclick="togglePassword()">
                            <i class="bi bi-eye" id="pw-icon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-netsible btn-primary-n" style="width:100%;justify-content:center;margin-top:8px">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
                <a href="{{ url_for('auth.forgot_password') }}" class="auth-link">Lupa password?</a>
            </form>
        </div>
    </div>
    <script>
    function togglePassword() {
        const pw = document.getElementById('password');
        const icon = document.getElementById('pw-icon');
        if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
        else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
    }
    </script>
</body>
</html>
